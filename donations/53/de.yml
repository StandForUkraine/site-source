# AI-assisted draft, pending native review
title: UNITED24
description: >
  UNITED24 ist die offizielle Spendenplattform des ukrainischen Präsidenten, gestartet im Mai 2022, um globale Unterstützung für die Ukraine zu bündeln.
  Spender:innen wählen einen Schwerpunkt — Verteidigung, Minenräumung, medizinische Hilfe, Wiederaufbau oder Bildung — und die Mittel werden auf eigens benannten Konten der Nationalbank der Ukraine mit öffentlicher Rechenschaft verwahrt.
