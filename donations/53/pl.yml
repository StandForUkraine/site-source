title: UNITED24
description: >
  UNITED24 to oficjalna platforma zbiórek Prezydenta Ukrainy, uruchomiona w maju 2022 r., aby zjednoczyć globalne wsparcie dla Ukrainy.
  Darczyńcy wybierają obszar — obrona, rozminowywanie, pomoc medyczna, odbudowa lub edukacja — a środki są przechowywane na wyznaczonych kontach Narodowego Banku Ukrainy z publiczną sprawozdawczością.
