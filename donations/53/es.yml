# AI-assisted draft, pending native review
title: UNITED24
description: >
  UNITED24 es la plataforma oficial de recaudación del Presidente de Ucrania, lanzada en mayo de 2022 para unir el apoyo global a Ucrania.
  Quien dona elige un área de enfoque — defensa, desminado, ayuda médica, reconstrucción o educación — y los fondos se custodian en cuentas designadas del Banco Nacional de Ucrania con rendición pública de cuentas.
