# AI-assisted draft, pending native review
title: UNITED24
description: >
  UNITED24 är Ukrainas presidents officiella insamlingsplattform, lanserad i maj 2022 för att samla globalt stöd för Ukraina.
  Donatorer väljer ett område — försvar, minröjning, sjukvård, återuppbyggnad eller utbildning — och medlen förvaras på särskilda konton i Ukrainas nationalbank med offentlig rapportering.
