# AI-assisted draft, pending native review
title: UNITED24
description: >
  UNITED24 è la piattaforma ufficiale di raccolta del Presidente dell'Ucraina, lanciata a maggio 2022 per unire il sostegno globale all'Ucraina.
  Chi dona sceglie un ambito — difesa, sminamento, aiuti medici, ricostruzione o istruzione — e i fondi sono custoditi su conti dedicati della Banca Nazionale dell'Ucraina con rendicontazione pubblica.
