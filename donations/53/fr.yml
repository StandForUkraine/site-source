title: UNITED24
description: >
  UNITED24 est la plateforme officielle de collecte du Président d'Ukraine, lancée en mai 2022 pour fédérer le soutien mondial à l'Ukraine.
  Les donateur·rice·s choisissent un domaine — défense, déminage, aide médicale, reconstruction ou éducation — et les fonds sont conservés sur des comptes dédiés de la Banque nationale d'Ukraine avec reddition publique des comptes.
