title: UNITED24
description: >
  UNITED24 — официальная платформа сбора средств Президента Украины, запущенная в мае 2022 года для объединения глобальной поддержки Украины.
  Доноры выбирают направление — оборона, разминирование, медицинская помощь, восстановление или образование — и средства хранятся на специальных счетах Национального банка Украины с публичной отчётностью.
