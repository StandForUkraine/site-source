# AI-assisted draft, pending native review
title: UNITED24
description: >
  UNITED24 is het officiële inzamelingsplatform van de president van Oekraïne, gelanceerd in mei 2022 om wereldwijde steun voor Oekraïne te bundelen.
  Donateurs kiezen een focusgebied — defensie, ontmijning, medische hulp, wederopbouw of onderwijs — en de middelen worden bewaard op aangewezen rekeningen van de Nationale Bank van Oekraïne met openbare verslaglegging.
