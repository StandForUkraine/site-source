title: Ukrainian Women's Guard
description: >
  Ukraińska ochotnicza organizacja kobieca, powstała w 2014 r. wraz z początkiem wojny rosyjsko-ukraińskiej; działalność rozpoczęła od masowego szkolenia z pierwszej pomocy dla kobiet, w połączeniu ze szkoleniem psychologicznym i psychiatrycznym. Od 2014 r. nasze szkolenie ukończyło ponad 40 000 kobiet z całej Ukrainy.
