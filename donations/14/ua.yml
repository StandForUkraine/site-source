title: Українська Жіноча Варта
description: >
  Українська волонтерська жіноча організація, заснована у 2014 році з початком російсько-української війни. Розпочала діяльність із масової домедичної підготовки для жінок у поєднанні з психологічною та психіатричною. З 2014 року навчання в УЖВ пройшли понад 40 000 жінок по всій Україні.
