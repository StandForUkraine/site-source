title: Garde Féminine Ukrainienne
description: >
  Organisation ukrainienne bénévole de femmes, née en 2014 avec le début de la guerre russo-ukrainienne ; elle a commencé son activité par une formation massive aux premiers secours pour les femmes, combinée à une préparation psychologique et psychiatrique. Depuis 2014, plus de 40 000 femmes à travers l'Ukraine ont suivi notre formation.
