title: Ukrainische Frauengarde
description: >
  Ukrainische freiwillige Frauenorganisation, gegründet 2014 mit Beginn des russisch-ukrainischen Krieges; begann ihre Tätigkeit mit massenhafter medizinischer Erste-Hilfe-Ausbildung für Frauen, kombiniert mit psychologischer und psychiatrischer Vorbereitung. Seit 2014 haben über 40 000 Frauen in der gesamten Ukraine unsere Ausbildung durchlaufen.
