title: Guardia Femminile Ucraina
description: >
  Organizzazione ucraina di donne volontarie, nata nel 2014 con l'inizio della guerra russo-ucraina; ha iniziato la propria attività con la formazione di primo soccorso di massa per donne, combinata con preparazione psicologica e psichiatrica. Dal 2014, più di 40 000 donne in tutta l'Ucraina hanno seguito la nostra formazione.
