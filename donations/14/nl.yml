title: Oekraïense Vrouwenwacht
description: >
  Oekraïense vrijwillige vrouwenorganisatie, ontstaan in 2014 met het begin van de Russisch-Oekraïense oorlog; begon met grootschalige eerstehulptraining voor vrouwen, gecombineerd met psychologische en psychiatrische voorbereiding. Sinds 2014 hebben meer dan 40 000 vrouwen in heel Oekraïne onze training gevolgd.
