description: >
  Organización voluntaria de mujeres ucranianas, surgida en 2014 con el inicio de la guerra ruso-ucraniana; comenzó su actividad con formación masiva de primeros auxilios para mujeres, combinada con preparación psicológica y psiquiátrica. Desde 2014, más de 40 000 mujeres en toda Ucrania han recibido nuestra formación.
