title: Первый добровольный мобильный госпиталь
description: >
  Первая частная военно-медицинская компания в Украине. ПДМГ — добровольческое медицинское формирование, официально входящее в Силы обороны; занимается медицинской эвакуацией и лечением в зоне боевых действий. С 2014 года помощь получили более 110 000 пациентов.
