title: Pirogov First Volunteer Mobile Hospital
description: >
  Het eerste particuliere militair-medische bedrijf in Oekraïne. PDMSh is een vrijwillige medische formatie die officieel deel uitmaakt van de Defensiemacht en medische evacuatie en behandeling biedt in gevechtsgebieden. Sinds 2014 hebben meer dan 110 000 patiënten zorg gekregen.
