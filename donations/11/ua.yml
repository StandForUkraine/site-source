title: Перший добровольчий мобільний шпиталь
description: >
  Перша приватна військово-медична компанія в Україні. ПДМШ — добровольче формування медиків, офіційно введене до складу Сил оборони; здійснює медичну евакуацію та лікування у зоні бойових дій. Із 2014 року допомогу отримали понад 110 000 пацієнтів.
