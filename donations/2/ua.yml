title: Благодійний фонд Сергія Притули
description: >
  Один із найбільших благодійних фондів України, що підтримує і військо, і цивільних.
  Постачає захисникам дрони, засоби зв'язку, оптику, транспорт та медичне забезпечення; передає гуманітарну допомогу — розмінування, медицину, шкільні укриття та модульне житло у деокупованих громадах.
link: https://prytulafoundation.org
donateLink: https://prytulafoundation.org/help-army
