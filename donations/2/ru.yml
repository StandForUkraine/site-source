title: Благотворительный фонд Сергея Притулы
description: >
  Один из крупнейших благотворительных фондов Украины, поддерживающий и военных, и гражданских.
  Снабжает защитников дронами, средствами связи, оптикой, транспортом и медикаментами; оказывает гуманитарную помощь — разминирование, медицина, школьные укрытия, модульное жильё в деоккупированных общинах.
