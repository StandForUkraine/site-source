title: Vostok SOS
description: Vostok SOS est une organisation non gouvernementale qui aide à trouver un abri pour les personnes déplacées à l'intérieur du pays, à évacuer les personnes de la zone de conflit, à collecter et à distribuer de l'aide humanitaire aux personnes déplacées à Kyiv, à fournir une aide humanitaire aux localités de première ligne et à fournir des premiers secours psychologiques.
