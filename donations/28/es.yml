# AI-assisted draft, pending native review
title: United Help Ukraine
description: >
  Una destacada organización sin ánimo de lucro con sede en EE. UU. que apoya a Ucrania mediante cuatro programas: equipo táctico, ayuda médica a más de 260 hospitales, asistencia humanitaria y sensibilización. Desde 2014, United Help Ukraine ha distribuido más de 82 000 botiquines de primeros auxilios y entregado vehículos, generadores y suministros a la población civil.
