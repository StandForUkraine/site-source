# AI-assisted draft, pending native review
title: Ukrainska Röda Korset
description: >
  Röda Korset ger nödhjälp till offer för det rysk-ukrainska kriget. Vi ger första medicinska och psykologiska hjälp, evakuerar civila och levererar humanitärt bistånd (kläder, mat, hygienartiklar, mediciner, rent vatten m.m.). Över 30 000 människor fick humanitär hjälp under de första fem dagarna av den väpnade konflikten 2022.
