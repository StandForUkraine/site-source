title: Oekraïens Rode Kruis
description: >
  Het Rode Kruis biedt noodhulp aan slachtoffers van de Russisch-Oekraïense oorlog. We bieden eerste medische en psychologische hulp, evacueren burgers en leveren humanitaire hulp (kleding, voedsel, hygiëneartikelen, medicijnen, schoon water enz.). In de eerste vijf dagen van het gewapend conflict in 2022 kregen meer dan 30 000 mensen humanitaire hulp.
