title: Ukrainisches Rotes Kreuz
description: >
  Das Rote Kreuz leistet Nothilfe für die Opfer des russisch-ukrainischen Krieges. Wir geben erste medizinische und psychologische Hilfe, evakuieren Zivilist:innen und liefern humanitäre Hilfe (Kleidung, Lebensmittel, Hygieneartikel, Medikamente, sauberes Wasser u. a.). Mehr als 30 000 Menschen erhielten in den ersten fünf Tagen des bewaffneten Konflikts 2022 humanitäre Hilfe.
