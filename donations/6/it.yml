title: Croce Rossa Ucraina
description: >
  La Croce Rossa fornisce aiuti d'emergenza alle vittime della guerra russo-ucraina. Diamo primo soccorso medico e psicologico, evacuiamo i civili e forniamo aiuti umanitari (vestiti, cibo, prodotti per l'igiene, medicinali, acqua potabile ecc.). Più di 30 000 persone hanno ricevuto aiuti umanitari nei primi cinque giorni del conflitto armato nel 2022.
