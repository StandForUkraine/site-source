title: Ukrainian Red Cross Society
description: >
  Czerwony Krzyż udziela pomocy doraźnej ofiarom wojny rosyjsko-ukraińskiej. Zapewniamy pierwszą pomoc medyczną i psychologiczną, ewakuujemy cywilów oraz dostarczamy pomoc humanitarną (odzież, żywność, środki higieniczne, leki, czystą wodę itp.). Ponad 30 000 osób otrzymało pomoc humanitarną w pierwszych pięciu dniach konfliktu zbrojnego w 2022 r.
