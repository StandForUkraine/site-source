# AI-assisted draft, pending native review
title: Croix-Rouge ukrainienne
description: >
  La Croix-Rouge apporte une aide d'urgence aux victimes de la guerre russo-ukrainienne. Nous offrons les premiers soins médicaux et psychologiques, évacuons les civils et livrons de l'aide humanitaire (vêtements, nourriture, hygiène, médicaments, eau potable, etc.). Plus de 30 000 personnes ont reçu de l'aide humanitaire dans les cinq premiers jours du conflit armé en 2022.
