title: Molfar
description: >
  Molfar ist eine ukrainische Nichtregierungsorganisation, die ukrainische Soldat:innen an der Front mit militärischer Ausrüstung, Technologie und medizinischer Hilfe versorgt.
  Sie beteiligt sich an Behandlung und Genesung verwundeter Soldat:innen und koordiniert medizinisches Personal: Ärzt:innen an der Front, Chirurg:innen, Freiwillige in Einrichtungen des Gesundheitswesens sowie Pharmazeut:innen.
