title: Molfar
description: >
  Molfar is een Oekraïense niet-gouvernementele organisatie die Oekraïense soldaten aan het front voorziet van militair materieel, technologie en medische hulp.
  De organisatie helpt ook bij behandeling en herstel van gewonde soldaten en coördineert medisch personeel: artsen aan het front, chirurgen, vrijwilligers in zorginstellingen en apothekers.
