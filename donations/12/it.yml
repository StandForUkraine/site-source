title: Molfar
description: >
  Molfar è un'organizzazione non governativa ucraina che fornisce alle truppe ucraine in prima linea equipaggiamento militare, tecnologia e assistenza medica.
  Partecipa anche al trattamento e al recupero del personale militare ferito e coordina il personale sanitario: medici al fronte, chirurghi, volontari nelle strutture sanitarie e farmacisti.
