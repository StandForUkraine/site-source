title: Molfar
description: >
  Molfar to ukraińska organizacja pozarządowa, która dostarcza wyposażenie wojskowe, technologie i pomoc medyczną ukraińskim żołnierzom na linii frontu.
  Uczestniczy także w leczeniu i rehabilitacji rannych żołnierzy oraz koordynuje pracę personelu medycznego: lekarzy na froncie, chirurgów, wolontariuszy w placówkach ochrony zdrowia i farmaceutów.
