title: Molfar
description: >
  Molfar est une organisation non gouvernementale ukrainienne qui fournit aux troupes ukrainiennes en première ligne du matériel militaire, de la technologie et une assistance médicale.
  Elle participe au traitement et à la rééducation du personnel militaire blessé et coordonne le personnel de santé : médecins au front, chirurgien·ne·s, bénévoles en établissements de santé et pharmacien·ne·s.
