title: Molfar
description: >
  Molfar es una organización no gubernamental ucraniana que provee equipo militar, tecnología y asistencia médica a las tropas ucranianas en primera línea.
  También participa en el tratamiento y la recuperación del personal militar herido y coordina al personal sanitario: médicos en el frente, cirujanos, personal voluntario en centros de salud y farmacéuticos.
