title: Підтримай Третю Штурмову
description: Офіційний благодійний фонд підтримки Третьої окремої штурмової бригади ЗСУ. Фонд закриває потреби бійців у спорядженні, техніці та транспорті, а також підтримує поранених через пов'язані патронатні служби.
