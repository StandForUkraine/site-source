title: People's Project
description: >
  People's Project — общественная организация. Объединение волонтёров и неравнодушных людей, координирующих усилия в социальных проектах поддержки народа Украины. Тысячи волонтёров и благотворителей из Украины и из-за рубежа участвуют в проектах. За время работы реализовано более ста благотворительных проектов с общим бюджетом свыше 100 миллионов гривен.
