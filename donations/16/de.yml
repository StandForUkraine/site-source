title: Armee SOS
description: Die SOS-Bürgerinitiative der Armee koordiniert die Bemühungen der Menschen, den Soldat:innen der Ukraine zu helfen. Sie verwaltet den Kauf der notwendigen Munition, Schilde, Kommunikations- und Aufklärungseinrichtungen, Uniformen und Lebensmittelversorgung. Alle Waren werden direkt an die Stellung der Einheit geliefert und direkt an unsere Soldat:innen übergeben.
