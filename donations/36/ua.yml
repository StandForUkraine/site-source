title: Nova Ukraine
description: >
  Велика американська некомерційна організація, яка з 2022 року допомогла понад 13 мільйонам українців. Nova Ukraine працює у чотирьох напрямах — Heal, Build, Empower, Advocate — надаючи медичну допомогу, відновлюючи інфраструктуру, забезпечуючи психосоціальну підтримку та політичну адвокацію.
