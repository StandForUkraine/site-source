title: Nova Ukraine
description: >
  Duża amerykańska organizacja non-profit, która od 2022 r. pomogła ponad 13 milionom Ukraińców. Nova Ukraine działa w czterech obszarach — Heal, Build, Empower, Advocate — zapewniając pomoc medyczną, odbudowę infrastruktury, wsparcie psychospołeczne i rzecznictwo polityczne.
