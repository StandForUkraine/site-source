title: Leleka Foundation
description: >
  Leleka Foundation is een Amerikaanse 501(c)(3) non-profit die sinds 2014 frontlinie-medici in Oekraïne ondersteunt.
  Levert tactische medische rugzakken, tourniquets, evacuatievoertuigen en bijbehorende uitrusting en training; sinds februari 2022 is meer dan 13 miljoen dollar opgehaald voor levensreddende medische hulp aan Oekraïne's verdedigers.
