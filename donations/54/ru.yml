title: Leleka Foundation
description: >
  Leleka Foundation — американская некоммерческая организация 501(c)(3), с 2014 года поддерживающая украинских медиков на передовой.
  Поставляет тактические медицинские рюкзаки, турникеты, эвакуационные автомобили и сопутствующие снаряжение и обучение; с февраля 2022 года собрано более 13 миллионов долларов на спасающую жизни медицинскую помощь защитникам Украины.
