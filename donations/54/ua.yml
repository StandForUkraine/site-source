title: Leleka Foundation
description: >
  Американська некомерційна організація 501(c)(3), що з 2014 року підтримує українських медиків на передовій. Постачає тактичні медичні рюкзаки, турнікети, евакуаційні автомобілі, обладнання та навчання; із лютого 2022 року зібрала понад 13 млн доларів на рятувальну медичну допомогу захисникам.
link: https://www.lelekafoundation.org/
donateLink: https://www.lelekafoundation.org/donate
