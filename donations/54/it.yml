title: Leleka Foundation
description: >
  Leleka Foundation è un'organizzazione 501(c)(3) statunitense non profit che dal 2014 sostiene il personale medico in prima linea in Ucraina.
  Fornisce zaini medici tattici, lacci emostatici, veicoli di evacuazione e relativi equipaggiamento e formazione; da febbraio 2022 ha raccolto oltre 13 milioni di dollari per aiuti medici salvavita a chi difende l'Ucraina.
