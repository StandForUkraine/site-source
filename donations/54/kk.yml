description: >
  Leleka Foundation — 2014 жылдан бері Украинадағы майдан шебіндегі медиктерді қолдап келе жатқан АҚШ-тағы 501(c)(3) коммерциялық емес ұйым. Тактикалық медициналық рюкзактар, турникеттер, эвакуация көліктері және соларға қатысты жабдық пен оқыту ұсынады; 2022 жылдың ақпанынан бері қорғаушыларға өмір сақтайтын медициналық көмек үшін 13 миллион доллардан астам қаражат жинады.
