title: Leleka Foundation
description: >
  Leleka Foundation es una organización 501(c)(3) sin ánimo de lucro con sede en EE. UU. que apoya al personal médico de primera línea en Ucrania desde 2014.
  Suministra mochilas médicas tácticas, torniquetes, vehículos de evacuación y equipo y formación asociados; desde febrero de 2022 ha recaudado más de 13 millones de dólares en ayuda médica vital para quienes defienden Ucrania.
