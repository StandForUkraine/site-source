description: >
  Leleka Foundation is a U.S.-based 501(c)(3) nonprofit that has supported frontline medics in Ukraine since 2014.
  It supplies tactical medical backpacks, tourniquets, evacuation vehicles, and related equipment and training; since February 2022 it has raised over $13 million for lifesaving medical aid to defenders.
