title: Leleka Foundation
description: >
  Leleka Foundation est une organisation à but non lucratif 501(c)(3) basée aux États-Unis, qui soutient les médecins de première ligne en Ukraine depuis 2014.
  Elle fournit des sacs médicaux tactiques, des garrots, des véhicules d'évacuation, ainsi que l'équipement et la formation associés ; depuis février 2022, elle a collecté plus de 13 millions de dollars pour l'aide médicale vitale à celles et ceux qui défendent l'Ukraine.
