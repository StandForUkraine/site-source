title: Leleka Foundation
description: >
  Die Leleka Foundation ist eine US-amerikanische 501(c)(3)-Non-Profit-Organisation, die seit 2014 ukrainische Sanitäter:innen an der Front unterstützt.
  Sie liefert taktische Medizinrucksäcke, Tourniquets, Evakuierungsfahrzeuge sowie zugehörige Ausrüstung und Schulungen; seit Februar 2022 wurden über 13 Mio. Dollar für lebensrettende medizinische Hilfe für Verteidiger:innen gesammelt.
