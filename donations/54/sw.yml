title: Leleka Foundation
description: >
  Leleka Foundation är en amerikansk 501(c)(3) icke-vinstdrivande organisation som sedan 2014 stöder ukrainsk frontlinjesjukvård.
  Levererar taktiska medicinska ryggsäckar, tourniquets, evakueringsfordon samt tillhörande utrustning och utbildning; sedan februari 2022 har över 13 miljoner dollar samlats in för livräddande sjukvård till Ukrainas försvarare.
