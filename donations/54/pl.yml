title: Leleka Foundation
description: >
  Leleka Foundation to amerykańska organizacja non-profit 501(c)(3), która od 2014 r. wspiera ukraińskich medyków na linii frontu.
  Dostarcza taktyczne plecaki medyczne, opaski uciskowe, pojazdy ewakuacyjne oraz powiązane wyposażenie i szkolenia; od lutego 2022 r. zebrała ponad 13 mln dolarów na ratującą życie pomoc medyczną dla obrońców.
